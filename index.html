<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국 로또 번호 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">다크 모드</button>
  <div class="container">
    <h1>한국 로또 번호 생성기</h1>
    <div class="lotto-info">
      <h2>한국 로또(6/45)란?</h2>
      <p>한국의 나눔로또 6/45는 1부터 45까지의 숫자 중에서 6개의 번호를 선택하여 맞추는 방식의 복권입니다. 6개 번호를 모두 맞추면 1등에 당첨됩니다.</p>
    </div>
    <div class="lotto-info">
        <h2>동행복권 사이트</h2>
        <p>동행복권은 대한민국 기획재정부 복권위원회가 지정한 복권수탁사업자입니다. 동행복권 웹사이트에서 로또 6/45, 연금복권 520, 스피또 등 다양한 복권의 구매와 당첨 확인이 가능합니다.</p>
    </div>
    <button id="generate-btn">로또 번호 10개 생성</button>
    <div id="lotto-numbers" class="lotto-numbers-container"></div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
