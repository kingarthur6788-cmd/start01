<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 & 연금복권 번호 생성기</title>
  <link href='./style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">다크 모드</button>
  <div class="container">
    <h1>복권 번호 생성기</h1>
    
    <!-- 로또 섹션 -->
    <div class="lotto-section">
      <div class="lotto-info">
        <h2>한국 로또(6/45)</h2>
        <p>1부터 45까지의 숫자 중 6개를 맞추는 방식입니다.</p>
      </div>
      <div class="button-group">
        <button id="generate-btn">로또 번호 5개 생성</button>
        <button id="toggle-lotto-btn" class="toggle-btn" style="display: none;">번호 숨기기</button>
      </div>
      <div id="lotto-numbers" class="lotto-numbers-container collapsible show"></div>
    </div>

    <hr class="divider">

    <!-- 연금복권 섹션 -->
    <div class="pension-section">
      <div class="lotto-info">
        <h2>연금복권 720+</h2>
        <p>조(1~5)와 6자리 숫자를 맞추어야 합니다.</p>
      </div>
      <div class="button-group">
        <button id="generate-pension-btn">연금복권 번호 5개 생성</button>
        <button id="toggle-pension-btn" class="toggle-btn" style="display: none;">번호 숨기기</button>
      </div>
      <div id="pension-numbers" class="lotto-numbers-container collapsible show"></div>
    </div>
  </div>
  <script defer type="text/javascript" src="./main.js"></script>
</body>
</html>
